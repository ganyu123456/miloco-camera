# ============================================================
# GPU 覆盖配置（NVIDIA）
# 用法：docker compose -f docker-compose.yaml -f docker-compose.gpu.yaml up -d
#
# 前提条件：
#   1. 宿主机已安装 NVIDIA 驱动
#   2. 已安装 nvidia-container-toolkit
#      https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
# ============================================================

services:
  miloco-camera:
    image: harbor.zkjgy.online/library/xiaomi-camera-web:gpu
    container_name: miloco-camera
    restart: unless-stopped

    # 使用宿主机网络，才能访问局域网内的摄像头
    network_mode: host

    environment:
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=video,compute,utility

    volumes:
      - ./data:/app/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    # 申请 GPU 资源
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, video]
