# ============================================================
# Windows 可执行文件打包 & 自动发布 Release
#
# 触发方式：
#   1. 推送版本 tag  (v*.*.*)  → 正式 Release，自动生成 changelog
#   2. 手动触发 (workflow_dispatch) → 可指定版本号，发布为预发布
#
# 发布产物（同时上传到 Release Assets）：
#   · miloco-camera.exe         —— 单文件可执行程序，双击直接运行
#   · miloco-camera-windows.zip —— 完整包（exe + README + data 目录）
#
# GPU 支持说明：
#   · NVIDIA GPU：安装 450+ 驱动后自动启用 NVDEC 硬件加速
#   · 无 GPU：自动回退 CPU 软解，功能完整
# ============================================================
name: Build Windows Executable

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 v1.2.0），留空则自动生成 dev 版本号'
        required: false
        default: ''
      prerelease:
        description: '标记为预发布版本'
        type: boolean
        default: true

env:
  APP_NAME: miloco-camera

jobs:
  build-and-release:
    name: Build EXE & Publish Release
    runs-on: windows-latest
    timeout-minutes: 60

    permissions:
      contents: write   # 创建 Release / 上传 Assets

    steps:
      # ── 1. 拉取代码 ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. 确定发布版本号 ─────────────────────────────────────
      # · tag 触发  → 使用 tag 名（如 v1.0.0）
      # · 手动触发  → 使用 inputs.version，若为空则用 dev-<run_id>
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VER="${GITHUB_REF_NAME}"
            IS_PRERELEASE="false"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VER="${{ github.event.inputs.version }}"
            IS_PRERELEASE="${{ github.event.inputs.prerelease }}"
          else
            VER="dev-${{ github.run_id }}"
            IS_PRERELEASE="true"
          fi
          echo "ver=${VER}"           >> "$GITHUB_OUTPUT"
          echo "prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${VER}"      >> "$GITHUB_OUTPUT"
          echo "Release version: ${VER} (prerelease=${IS_PRERELEASE})"

      # ── 3. 配置 Python 3.12 ──────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── 4. 安装依赖 ──────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install "opencv-python-headless" pyinstaller

      # ── 5. 验证关键依赖 ──────────────────────────────────────
      - name: Verify key packages
        run: |
          python -c "import av; print('PyAV:', av.__version__)"
          python -c "import cv2; print('OpenCV:', cv2.__version__)"
          python -c "import miloco_sdk; print('miloco_sdk OK')"

      # ── 6. PyInstaller 打包 ──────────────────────────────────
      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --console `
            --name "${{ env.APP_NAME }}" `
            --add-data "miloco_sdk/configs;miloco_sdk/configs" `
            --add-data "app/web/templates;web/templates" `
            --add-data "app/web/static;web/static" `
            --collect-all av `
            --collect-all uvicorn `
            --collect-all jinja2 `
            --collect-all markupsafe `
            --collect-all starlette `
            --hidden-import miloco_sdk `
            --hidden-import miloco_sdk.cli `
            --hidden-import miloco_sdk.cli.utils `
            --hidden-import miloco_sdk.plugin `
            --hidden-import miloco_sdk.plugin.authorize `
            --hidden-import miloco_sdk.plugin.home `
            --hidden-import miloco_sdk.plugin.miot `
            --hidden-import miloco_sdk.utils `
            --hidden-import aiohttp `
            --hidden-import cryptography `
            --hidden-import fastapi `
            --hidden-import fastapi.responses `
            --hidden-import fastapi.staticfiles `
            --hidden-import fastapi.templating `
            --hidden-import uvicorn `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.asyncio `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.h11_impl `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import sqlalchemy `
            --hidden-import sqlalchemy.dialects.sqlite `
            --hidden-import sqlalchemy.dialects.sqlite.aiosqlite `
            --hidden-import aiosqlite `
            --hidden-import aiofiles `
            --hidden-import psutil `
            --hidden-import pynvml `
            --hidden-import cv2 `
            --hidden-import multipart `
            --hidden-import email.mime.text `
            --hidden-import email.mime.multipart `
            --hidden-import smtplib `
            app/main.py

      # ── 7. 检查 EXE ──────────────────────────────────────────
      - name: Verify EXE
        id: exeinfo
        shell: pwsh
        run: |
          $exe = "dist\${{ env.APP_NAME }}.exe"
          if (-not (Test-Path $exe)) { Write-Error "EXE not found!"; exit 1 }
          $sizeMB = [math]::Round((Get-Item $exe).length / 1MB, 1)
          Write-Host "EXE size: ${sizeMB} MB"
          echo "size_mb=${sizeMB}" >> $env:GITHUB_OUTPUT

      # ── 8. 制作 ZIP 发布包 ────────────────────────────────────
      - name: Create ZIP package
        shell: pwsh
        run: |
          $pkg = "dist\${{ env.APP_NAME }}-windows"
          New-Item -ItemType Directory -Force -Path $pkg | Out-Null
          New-Item -ItemType Directory -Force -Path "$pkg\data" | Out-Null

          Copy-Item "dist\${{ env.APP_NAME }}.exe" "$pkg\"

          $ver = "${{ steps.version.outputs.ver }}"
          $readme = @"
          # Miloco Camera $ver - Windows 版

          ## 快速开始

          1. 将 ``auth_info.json``（小米账号授权文件）放入 ``data\`` 目录
             - 首次运行程序会引导您扫码授权，授权后自动生成该文件
          2. 双击运行 ``${{ env.APP_NAME }}.exe``
          3. 控制台出现 "Application startup complete" 后
             打开浏览器访问 http://localhost:8080

          ## GPU 硬件加速

          | 硬件       | 支持状态                           |
          |------------|------------------------------------|
          | NVIDIA GPU | 自动启用 NVDEC（需驱动版本 450+）   |
          | Intel/AMD  | 自动启用 DXVA2 / D3D11VA           |
          | 无 GPU     | CPU 软解码，功能完整               |

          ## 目录说明

          ```
          miloco-camera-windows\
          ├── miloco-camera.exe    ← 主程序
          └── data\
              └── auth_info.json  ← 放置授权文件（首次运行后自动创建）
          ```
          "@ -replace '^          ', ''

          Set-Content -Path "$pkg\README.txt" -Value $readme -Encoding UTF8

          Compress-Archive -Path "$pkg\*" `
            -DestinationPath "dist\${{ env.APP_NAME }}-windows-${{ steps.version.outputs.ver }}.zip" `
            -Force
          Write-Host "ZIP created"

      # ── 9. 上传 Artifact（始终保留，方便 PR 等非 tag 场景下载）─
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-${{ steps.version.outputs.ver }}
          path: |
            dist/${{ env.APP_NAME }}.exe
            dist/${{ env.APP_NAME }}-windows-${{ steps.version.outputs.ver }}.zip
          retention-days: 14

      # ── 10. 创建 / 更新 GitHub Release 并上传产物 ─────────────
      # 同时上传：
      #   · 裸 .exe（直接下载即可用，无需解压）
      #   · ZIP 包（含 README 和 data 目录结构）
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: "${{ env.APP_NAME }} ${{ steps.version.outputs.ver }}"
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/') }}
          body: |
            ## 📦 Miloco Camera ${{ steps.version.outputs.ver }} — Windows 版

            ### 下载

            | 文件 | 说明 |
            |------|------|
            | **`${{ env.APP_NAME }}.exe`** | ✅ 推荐：单文件，双击直接运行 |
            | `${{ env.APP_NAME }}-windows-${{ steps.version.outputs.ver }}.zip` | 完整包，含 README 和 data 目录结构 |

            ### 快速使用

            1. 下载 `${{ env.APP_NAME }}.exe`
            2. 将 `auth_info.json`（小米账号授权）放入同目录的 `data\` 文件夹
            3. 双击运行，浏览器访问 **http://localhost:8080**

            ### GPU 支持
            - **NVIDIA**：安装 450+ 驱动自动启用 NVDEC 硬件加速
            - **Intel / AMD**：自动启用 DXVA2 / D3D11VA
            - **无 GPU**：自动 CPU 软解，功能完整

            > EXE 大小：${{ steps.exeinfo.outputs.size_mb }} MB | 平台：Windows x64
          files: |
            dist/${{ env.APP_NAME }}.exe
            dist/${{ env.APP_NAME }}-windows-${{ steps.version.outputs.ver }}.zip

      # ── 11. Job Summary ──────────────────────────────────────
      - name: Write job summary
        shell: pwsh
        run: |
          $ver  = "${{ steps.version.outputs.ver }}"
          $size = "${{ steps.exeinfo.outputs.size_mb }}"
          $pre  = "${{ steps.version.outputs.prerelease }}"
          @"
          ## ✅ Windows EXE 打包完成

          | 项目 | 详情 |
          |------|------|
          | 版本 | ``$ver`` |
          | 文件 | ``${{ env.APP_NAME }}.exe`` |
          | 大小 | ${size} MB |
          | 预发布 | $pre |
          | Release | https://github.com/${{ github.repository }}/releases/tag/$ver |
          "@ >> $env:GITHUB_STEP_SUMMARY