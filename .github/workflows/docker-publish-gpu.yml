# ============================================================
# GPU 镜像工作流：构建含 NVDEC (CUDA 12.2 + 自编译 FFmpeg) 的镜像并推送至 GitHub Packages
# 触发条件：push 到 main 分支 / 推送版本 tag (v*.*.*) / 手动触发
# 注意：GPU 镜像因需从源码编译 FFmpeg，构建时间较长（约 30~60 分钟）
# ============================================================
name: Build & Push GPU Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-gpu:
    name: Build GPU Image (amd64)
    runs-on: ubuntu-latest
    # GPU 镜像编译时间较长，给予充足超时时间
    timeout-minutes: 90

    permissions:
      contents: read
      packages: write

    steps:
      # ── 1. 拉取代码 ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. 释放磁盘空间（GPU 镜像体积较大）─────────────────
      - name: Free disk space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          sudo apt-get clean
          df -h

      # ── 3. 创建 Buildx 构建器 ────────────────────────────────
      #     GPU 镜像仅支持 amd64，不需要 QEMU
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. 登录 GitHub Container Registry ───────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. 生成 GPU 镜像专属 Tag 与 Label ───────────────────
      # 生成规则：
      #   push main  → gpu, sha-<short>-gpu
      #   push v1.2.3 → v1.2.3-gpu, 1.2-gpu, gpu, sha-<short>-gpu
      - name: Extract Docker metadata (GPU)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=gpu,enable={{is_default_branch}}
            type=semver,pattern={{version}}-gpu
            type=semver,pattern={{major}}.{{minor}}-gpu
            type=sha,prefix=sha-,suffix=-gpu,format=short

      # ── 6. 构建并推送 GPU 镜像 ───────────────────────────────
      #     Dockerfile.gpu 包含：
      #       Stage 1: nvidia/cuda:12.2.0-devel 编译带 NVDEC 的 FFmpeg 6.1
      #       Stage 2: nvidia/cuda:12.2.0-runtime 运行时（Python 3.12 + PyAV 从源码编译）
      - name: Build and push GPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.gpu
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=gpu
          cache-to: type=gha,scope=gpu,mode=max

      # ── 7. 输出镜像摘要 ──────────────────────────────────────
      - name: Print image digest
        run: |
          echo "## GPU 镜像已推送至 GitHub Packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | 说明 |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`ghcr.io/${{ env.IMAGE_NAME }}:gpu\` | 最新主线 GPU 版本 |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ghcr.io/${{ env.IMAGE_NAME }}:sha-$(git rev-parse --short HEAD)-gpu\` | 当前提交 GPU 版 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> GPU 镜像基于 CUDA 12.2 + 自编译 FFmpeg 6.1 (NVDEC)，仅支持 NVIDIA GPU 运行时" >> $GITHUB_STEP_SUMMARY
