# ============================================================
# 流媒体网关 — Docker 镜像构建与发布
# 构建 linux/amd64 + linux/arm64 多平台镜像，推送至 GitHub Packages
#
# 触发条件：
#   · push main → latest + sha-<short>
#   · push v*.*.* → 语义化版本 tag + latest + Release 离线包
#   · PR → 仅构建不推送（验证 Dockerfile 正确性）
#   · 手动触发
# ============================================================
name: Build & Push Gateway Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build Image (amd64 + arm64)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          sudo apt-get clean

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # push main  → latest, sha-<short>
      # push v1.2.3 → v1.2.3, 1.2, latest, sha-<short>
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write job summary
        if: github.event_name != 'pull_request'
        run: |
          echo "## ✅ 流媒体网关镜像已推送" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | 说明 |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`ghcr.io/${{ env.IMAGE_NAME }}:latest\` | 最新主线版本 |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ghcr.io/${{ env.IMAGE_NAME }}:sha-$(git rev-parse --short HEAD)\` | 本次提交 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 多平台：\`linux/amd64\` + \`linux/arm64\`" >> $GITHUB_STEP_SUMMARY

  # ── Release 离线镜像包（每次 push 都触发，PR 除外）────────────
  #   · push v*.*.* → 正式 Release，tag = 版本号，prerelease=false
  #   · push main   → 滚动 Nightly Release，tag = "nightly"，prerelease=true（每次覆盖）
  release-images:
    name: Export & Upload Release Images
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'

    permissions:
      contents: write   # 创建 Release 并上传附件
      packages: read    # 从 ghcr.io 拉取镜像

    steps:
      # 根据触发方式确定：拉取的镜像 tag、Release tag、是否 prerelease
      - name: Resolve version info
        id: ver
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/}"
            echo "image_tag=${VER}"      >> $GITHUB_OUTPUT
            echo "release_tag=${VER}"    >> $GITHUB_OUTPUT
            echo "release_name=${VER}"   >> $GITHUB_OUTPUT
            echo "prerelease=false"      >> $GITHUB_OUTPUT
            echo "file_tag=${VER}"       >> $GITHUB_OUTPUT
          else
            echo "image_tag=latest"                              >> $GITHUB_OUTPUT
            echo "release_tag=nightly"                           >> $GITHUB_OUTPUT
            echo "release_name=Nightly Build (sha-${SHORT_SHA})" >> $GITHUB_OUTPUT
            echo "prerelease=true"                               >> $GITHUB_OUTPUT
            echo "file_tag=nightly"                              >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 导出 amd64 ──────────────────────────────────────────
      - name: Pull & save amd64
        run: |
          docker pull --platform linux/amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.image_tag }}
          docker save \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.image_tag }} \
            | gzip > miloco-camera-${{ steps.ver.outputs.file_tag }}-amd64.tar.gz

      # ── 导出 arm64 ──────────────────────────────────────────
      - name: Pull & save arm64
        run: |
          # 移除本地 amd64 tag 避免覆盖保存
          docker rmi \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.image_tag }} || true
          docker pull --platform linux/arm64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.image_tag }}
          docker save \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.image_tag }} \
            | gzip > miloco-camera-${{ steps.ver.outputs.file_tag }}-arm64.tar.gz

      # ── 创建 / 更新 GitHub Release 并上传 ──────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.release_tag }}
          name: ${{ steps.ver.outputs.release_name }}
          draft: false
          prerelease: ${{ steps.ver.outputs.prerelease }}
          make_latest: ${{ steps.ver.outputs.prerelease == 'false' }}
          files: |
            miloco-camera-${{ steps.ver.outputs.file_tag }}-amd64.tar.gz
            miloco-camera-${{ steps.ver.outputs.file_tag }}-arm64.tar.gz
          body: |
            ## 离线镜像包（适合无法访问 ghcr.io 的内网服务器）

            | 文件 | 适用架构 |
            |------|---------|
            | `miloco-camera-${{ steps.ver.outputs.file_tag }}-amd64.tar.gz` | x86_64 服务器 / 普通 PC |
            | `miloco-camera-${{ steps.ver.outputs.file_tag }}-arm64.tar.gz` | ARM64 设备（树莓派 4B+、RK3588 等） |

            ### 使用方法

            ```bash
            # 1. 上传到目标服务器（选择对应架构）
            scp miloco-camera-${{ steps.ver.outputs.file_tag }}-amd64.tar.gz user@server:~

            # 2. 在服务器上加载镜像
            docker load < miloco-camera-${{ steps.ver.outputs.file_tag }}-amd64.tar.gz

            # 3. 重新打 latest tag（docker-compose 默认拉 latest）
            docker tag \
              ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.image_tag }} \
              ghcr.io/${{ env.IMAGE_NAME }}:latest

            # 4. 启动服务
            docker compose up -d
            ```
