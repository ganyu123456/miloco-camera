{% extends "base.html" %}
{% set active = "detections" %}
{% block title %}检测算法配置{% endblock %}
{% block page_title %}检测算法配置{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <span style="font-size:13px;color:var(--text-muted)">为每路摄像头配置 YOLO 目标检测、入侵区域、越线检测规则</span>
  <button class="btn btn-primary btn-sm" onclick="openAdd()">
    <i class="bi bi-plus-lg"></i> 新增规则
  </button>
</div>

<!-- Filter -->
<div class="d-flex gap-2 mb-3 align-items-center">
  <span style="font-size:12px;color:var(--text-muted)">筛选摄像头：</span>
  <select class="form-select form-select-sm" id="f-cam" onchange="load()" style="width:auto;max-width:200px">
    <option value="">全部</option>
    {% for cam in cameras %}
    <option value="{{ cam.id }}">{{ cam.name }}</option>
    {% endfor %}
  </select>
</div>

<!-- Table -->
<div class="card">
  <div class="card-header">
    <i class="bi bi-eye" style="color:var(--accent)"></i>
    检测规则列表
    <span id="det-count" style="font-size:11px;color:var(--text-muted);margin-left:4px"></span>
  </div>
  <div style="overflow-x:auto">
    <table class="data-table">
      <thead>
        <tr>
          <th>规则名称</th><th>摄像头</th><th>类型</th>
          <th>配置摘要</th><th>状态</th><th style="width:100px">操作</th>
        </tr>
      </thead>
      <tbody id="det-tbody">
        <tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-muted)">
          <div class="spinner-border spinner-border-sm"></div>
        </td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ── Add Modal ── -->
<div class="modal fade" id="modalAdd" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title"><i class="bi bi-plus-circle me-2" style="color:var(--accent)"></i>新增检测规则</span>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
          <div>
            <label class="form-label">规则名称 <span style="color:var(--red)">*</span></label>
            <input type="text" class="form-control" id="add-name" placeholder="如：人员入侵检测">
          </div>
          <div>
            <label class="form-label">摄像头 <span style="color:var(--red)">*</span></label>
            <select class="form-select" id="add-cam">
              {% for cam in cameras %}
              <option value="{{ cam.id }}">{{ cam.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="form-label">检测类型</label>
            <select class="form-select" id="add-type" onchange="fillTemplate()">
              <option value="yolo">YOLO 目标检测</option>
              <option value="intrusion">入侵区域检测</option>
              <option value="collision">越线检测（绊线）</option>
            </select>
          </div>
          <div class="d-flex align-items-end">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" id="add-enabled">
              <label class="form-check-label" for="add-enabled" style="font-size:13px">立即启用</label>
            </div>
          </div>
        </div>
        <div>
          <label class="form-label">配置参数 (JSON)</label>
          <textarea class="form-control font-mono" id="add-config" rows="7" style="font-size:12px"></textarea>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px" id="add-hint"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-primary btn-sm" id="btn-add" onclick="submitAdd()">
          <i class="bi bi-plus-lg"></i> 添加
        </button>
      </div>
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
const CAMS_MAP = { {% for cam in cameras %}"{{ cam.id }}": "{{ cam.name }}", {% endfor %} };
const TYPE_LABEL = {yolo:'YOLO 目标', intrusion:'入侵区域', collision:'越线检测'};
const TYPE_COLOR = {yolo:'#2f81f7', intrusion:'var(--red)', collision:'var(--yellow)'};
const TEMPLATES = {
  yolo: {
    cfg: {confidence:0.5, iou:0.45, classes:["person","car"], model:"yolo11n.pt"},
    hint: "classes: 目标类别（空数组=全部）。confidence: 置信度阈值 0~1"
  },
  intrusion: {
    cfg: {roi:[[100,100],[600,100],[600,400],[100,400]], min_area:500, sensitivity:50},
    hint: "roi: 多边形顶点 [[x,y],...]，min_area: 最小触发面积（像素²）"
  },
  collision: {
    cfg: {lines:[[[0,300],[1920,300]]], min_area:300, sensitivity:40},
    hint: "lines: 虚拟绊线列表，格式 [[[x1,y1],[x2,y2]],...]"
  }
};

function fillTemplate() {
  const t = TEMPLATES[document.getElementById('add-type').value];
  document.getElementById('add-config').value = JSON.stringify(t.cfg, null, 2);
  document.getElementById('add-hint').textContent = t.hint;
}
fillTemplate();

async function load() {
  const camId = document.getElementById('f-cam').value;
  const url = camId ? `/api/detections?camera_id=${camId}` : '/api/detections';
  const data = await api('GET', url).catch(()=>null);
  if (!data) return;

  document.getElementById('det-count').textContent = `共 ${data.detections.length} 条`;
  const tbody = document.getElementById('det-tbody');
  if (!data.detections.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state" style="text-align:center">暂无规则，点击"新增规则"开始配置</td></tr>';
    return;
  }
  tbody.innerHTML = data.detections.map(d => {
    const cfg = d.config || {};
    let summary = '';
    if (d.type==='yolo')      summary = `置信度 ≥ ${cfg.confidence||0.5} | ${(cfg.classes||[]).join(',') || '全类别'}`;
    else if (d.type==='intrusion') summary = `ROI ${(cfg.roi||[]).length} 点 | 最小 ${cfg.min_area||500}px²`;
    else if (d.type==='collision') summary = `${(cfg.lines||[]).length} 条绊线`;
    const color = TYPE_COLOR[d.type]||'var(--text-muted)';
    return `<tr>
      <td style="font-weight:600">${d.name}</td>
      <td style="color:var(--text-muted)">${CAMS_MAP[d.camera_id]||'未知'}</td>
      <td><span style="background:${color}18;color:${color};border:1px solid ${color}30;padding:2px 8px;border-radius:20px;font-size:11px">${TYPE_LABEL[d.type]||d.type}</span></td>
      <td style="font-size:12px;color:var(--text-muted)">${summary}</td>
      <td>
        <div class="form-check form-switch" style="margin:0">
          <input class="form-check-input" type="checkbox" ${d.enabled?'checked':''} onchange="toggle(${d.id},this)">
        </div>
      </td>
      <td><button class="btn btn-outline-danger btn-sm" onclick="del(${d.id})"><i class="bi bi-trash3"></i></button></td>
    </tr>`;
  }).join('');
}

async function toggle(id, cb) {
  try {
    const res = await api('POST', `/api/detections/${id}/toggle`);
    showToast(res.enabled ? '已启用' : '已停用', res.enabled ? 'ok' : 'warn');
  } catch(e) { showToast(e.message,'err'); cb.checked = !cb.checked; }
}

async function del(id) {
  if (!confirm('确定删除该检测规则？')) return;
  try { await api('DELETE', `/api/detections/${id}`); showToast('已删除'); load(); }
  catch(e) { showToast(e.message,'err'); }
}

let _addModal;
function openAdd() {
  if (!_addModal) _addModal = new bootstrap.Modal(document.getElementById('modalAdd'));
  _addModal.show();
}

async function submitAdd() {
  const name = document.getElementById('add-name').value.trim();
  const camId = document.getElementById('add-cam').value;
  if (!name) { showToast('请填写规则名称','warn'); return; }
  let config;
  try { config = JSON.parse(document.getElementById('add-config').value); }
  catch(e) { showToast('JSON 格式错误，请检查','err'); return; }
  const btn = document.getElementById('btn-add');
  btn.disabled = true;
  try {
    await api('POST', '/api/detections', {
      name, camera_id: parseInt(camId),
      type: document.getElementById('add-type').value,
      enabled: document.getElementById('add-enabled').checked,
      config,
    });
    showToast('检测规则添加成功');
    _addModal.hide();
    document.getElementById('add-name').value = '';
    load();
  } catch(e) { showToast(e.message,'err'); }
  finally { btn.disabled = false; }
}

load();
</script>
{% endblock %}
