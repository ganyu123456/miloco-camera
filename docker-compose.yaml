# ============================================================
# 流媒体网关 - 部署配置
#   docker compose up -d
# ============================================================

services:
  miloco-camera:
    image: ghcr.io/ganyu123456/miloco-camera:latest
    # 本地构建：build: .
    container_name: miloco-camera
    restart: unless-stopped

    # 必须使用宿主机网络才能通过局域网发现摄像头
    # host 模式下 8080(Web) 和 8554(RTSP) 直接使用宿主机端口，无需 ports 映射
    network_mode: host

    environment:
      - TZ=Asia/Shanghai
      - LANG=C.UTF-8
      # ↓ 必填：填写服务器的实际局域网 IP，供 ai-detector 等外部客户端拼接 RTSP 地址
      - RTSP_HOST=0.0.0.0

    volumes:
      # 持久化 auth_info.json（小米授权）和数据库文件，重启容器后不需重新登录
      - ./data:/app/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
